appId: com.yuwoori.codi
productName: Codi
copyright: Copyright © 2026 유우리

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - dist-electron/**/*
  - assets/**/*
  - package.json

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  title: Codi ${version}
  icon: build/icon.icns
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

publish: null
